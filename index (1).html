<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&S Parfums</title>
<style>
body{font-family:Arial;background:#0A0A0A;color:#F5F0E8;margin:0;padding:20px;}
.login-card{background:#1A1A1A;padding:30px;max-width:400px;margin:50px auto;border-radius:16px;}
input{width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #C9A84C;color:white;border-radius:8px;}
button{background:#C9A84C;color:#000;padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;}
button:hover{background:#E8C97A;}
.error{color:#C94C4C;margin-top:10px;display:none;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>S&S Parfums</h2>
    <input type="text" id="lu" placeholder="Usuario" value="admin">
    <input type="password" id="lp" placeholder="Contraseña" value="ss2026">
    <button onclick="doLogin()">Ingresar</button>
    <div id="login-err" class="error">Usuario o contraseña incorrectos</div>
  </div>
</div>

<div id="main-app" style="display:none">
  <h1>Sistema S&S Parfums</h1>
  <p>Bienvenido, <span id="t-user"></span></p>
  <button onclick="logout()">Salir</button>
  <hr>
  <div id="contenido">
    <h3>✅ Has iniciado sesión correctamente!</h3>
    <p>El sistema funciona. Ahora podemos agregar el resto de funciones.</p>
  </div>
</div>

<script>
// Usuario fijo para prueba
const USUARIO_VALIDO = { user: 'admin', pass: 'ss2026', nombre: 'Administrador' };

function doLogin() {
  const user = document.getElementById('lu').value;
  const pass = document.getElementById('lp').value;
  const errorDiv = document.getElementById('login-err');
  
  console.log("Intentando login con:", user);
  
  if(user === USUARIO_VALIDO.user && pass === USUARIO_VALIDO.pass) {
    console.log("Login exitoso");
    errorDiv.style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('t-user').innerText = USUARIO_VALIDO.nombre;
  } else {
    console.log("Login fallido");
    errorDiv.style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('lu').value = 'admin';
  document.getElementById('lp').value = 'ss2026';
}
</script>

</body>
</html>
